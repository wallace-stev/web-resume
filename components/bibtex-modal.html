<!-- Bibtex Modal -->
<div id="bibtexModal" class="modal hidden">
    <div class="bg-white rounded-lg p-6 w-full max-w-2xl mx-4 max-h-[80vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-gray-900">BibTeX Citation</h2>
            <button class="modal-close text-gray-500 hover:text-gray-700 text-2xl cursor-pointer">&times;</button>
        </div>
        <pre id="bibtexContent" class="bg-gray-50 p-4 rounded text-sm text-gray-800 overflow-x-auto whitespace-pre-wrap break-all"></pre>
        <div class="mt-4 flex justify-end">
            <button id="copyBibtexBtn" class="px-4 py-2 bg-violet-700 text-white rounded-md hover:bg-violet-800 text-sm transition cursor-pointer">
                <i class="fas fa-copy mr-2"></i>Copy
            </button>
        </div>
    </div>
</div>
